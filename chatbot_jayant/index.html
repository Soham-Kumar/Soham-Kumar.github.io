<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA NIM Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .chat-header {
            background-color: #f8fafc;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
            font-weight: bold;
        }
        .chat-messages {
            padding: 1rem;
            height: 400px;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
        }
        .message {
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            max-width: 70%;
            clear: both;
        }
        .user-message {
            background-color: #dbeafe;
            float: right;
        }
        .bot-message {
            background-color: #f0f9ff;
            float: left;
        }
        .chat-input-container {
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
        }
        .chat-input {
            flex-grow: 1;
            padding: 0.5rem;
            border: 1px solid #cbd5e0;
            border-radius: 0.25rem;
            margin-right: 0.5rem;
        }
        .send-button {
            background-color: #3b82f6;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
        }
        .send-button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            NVIDIA NIM Chatbot
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be appended here -->
        </div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="message-input" placeholder="Type your message...">
            <button class="send-button" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        let chatHistory = [];

        function displayMessage(message, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Scroll to bottom
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            displayMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            messageInput.value = '';

            try {
                const response = await fetch('http://localhost:5000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ messages: chatHistory }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                let partialResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }
                    const textChunk = new TextDecoder().decode(value);
                    partialResponse += textChunk;

                    // Check if a complete message can be extracted (e.g., by a delimiter or just append)
                    // For simplicity, we are appending here. You might need a more robust way
                    // if the backend sends messages in parts with specific delimiters.
                    if (chatHistory.length === 0 || chatHistory[chatHistory.length - 1].role !== 'assistant') {
                        chatHistory.push({ role: 'assistant', content: textChunk });
                        displayMessage(textChunk, 'bot');
                    } else {
                        chatHistory[chatHistory.length - 1].content += textChunk;
                        // Update the last bot message in the UI
                        const lastBotMessageDivs = chatMessages.querySelectorAll('.bot-message');
                        if (lastBotMessageDivs.length > 0) {
                            lastBotMessageDivs[lastBotMessageDivs.length - 1].textContent = chatHistory[chatHistory.length - 1].content;
                        }
                    }
                }

            } catch (error) {
                console.error('Error sending message:', error);
                displayMessage('Error communicating with the chatbot.', 'bot');
            }
        }

        messageInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
